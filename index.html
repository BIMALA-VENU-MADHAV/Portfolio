<!DOCTYPE html>
<html lang="en">

<head>
  <title>Bimala Venu Madhav Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#000000" />
  <meta name="google-site-verification" content="RhJblDjQYpAClUZtfrJvN3gcjaLojVcNmqftYeYxKP0" />
  <link rel="icon" href="/favicon.ico" />

  <style>
    #preloader {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PT Mono", monospace;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="preloader">LOADING</div>
  <div id="root"></div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("preloader").classList.add("hidden");
      }, 700);
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
